services:
  - type: web
    name: q-armor-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install --only-binary=pydantic-core,cryptography -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 30
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: FRONTEND_URLS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        value: authenticated
