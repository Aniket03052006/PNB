# ------------------------------------------------------------------------------
# Q-ARMOR PQC Compliance Scanner -- GitHub Actions CI/CD Pipeline
#
# Phase 5: Compliance-as-Code automation
#   - Triggers: weekly Monday cron + push to main
#   - Scans the configured target for quantum-vulnerable cryptography
#   - Saves Phase 2 assessment JSON report from the REAL scan
#   - Generates CDXA attestation from real scan results
#   - Sends webhook alerts if HNDL / HIGH risk detected
#   - BUILD-BREAKING: Fails pipeline if any SCANNED endpoint has HIGH quantum risk
# ------------------------------------------------------------------------------

name: Q-ARMOR PQC Compliance Scan

on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Target hostname to scan (e.g. pnbindia.in)'
        required: false
        default: 'pnbindia.in'
      strict:
        description: 'Fail build on HIGH quantum risk (true = enforce, false = audit-only)'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.11'
  QARMOR_SLACK_WEBHOOK: ${{ secrets.QARMOR_SLACK_WEBHOOK }}
  QARMOR_TEAMS_WEBHOOK: ${{ secrets.QARMOR_TEAMS_WEBHOOK }}

jobs:
  pqc-scan:
    name: PQC Compliance Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -- Phase 1+2: Scan REAL target & save JSON report ---------------
      - name: Run PQC scan with assessment
        id: scan
        run: |
          TARGET="${{ github.event.inputs.target || 'pnbindia.in' }}"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "::group::Q-ARMOR scan -- ${TARGET}"
          python scan.py \
            --target "${TARGET}" \
            --format assess \
            --assess \
            --output scan-report.json \
            -v && echo "scan_ok=true" >> "$GITHUB_OUTPUT" \
                || echo "scan_ok=false" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          exit 0

      # -- Phase 5: Generate CDXA attestation from REAL scan data -------
      - name: Generate CDXA attestation
        if: always()
        run: |
          python - << 'PYEOF'
          import json, sys
          from pathlib import Path
          from backend.scanner.attestor import generate_attestation

          report_path = Path("scan-report.json")
          if not report_path.exists():
              print("scan-report.json not found -- skipping attestation")
              sys.exit(0)

          try:
              report      = json.loads(report_path.read_text())
              assessments = report.get("phase2_assessment", {}).get("assessments", [])
              if not assessments:
                  print("No assessment data in scan report -- skipping attestation")
                  sys.exit(0)
              print(f"Generating attestation for {len(assessments)} endpoint(s)...")
              cdxa = generate_attestation(
                  assessment_results=assessments,
                  output_file="attestation-cdxa.json",
              )
              body = cdxa["attestation"]
              cs   = body["complianceSummary"]
              print(f"Status:        {cs['overallStatus']}")
              print(f"Compliant:     {cs['compliant']}/{cs['totalEndpoints']} ({cs['compliant_pct']})")
              print(f"Non-Compliant: {cs['nonCompliant']} ({cs['nonCompliant_pct']})")
              print(f"Serial:        {body['serialNumber']}")
              print("Signed (Ed25519): yes")
          except Exception as exc:
              print(f"Attestation failed: {exc}", file=sys.stderr)
              sys.exit(0)
          PYEOF

      # -- Phase 5: Send webhook alerts from REAL scan data -------------
      - name: Send webhook alerts
        if: always()
        env:
          QARMOR_SLACK_WEBHOOK: ${{ secrets.QARMOR_SLACK_WEBHOOK }}
          QARMOR_TEAMS_WEBHOOK: ${{ secrets.QARMOR_TEAMS_WEBHOOK }}
        run: |
          python - << 'PYEOF'
          import json, sys
          from pathlib import Path
          from backend.scanner.labeler import evaluate_and_label, summarize_labels
          from backend.scanner.notifier import send_alerts

          report_path = Path("scan-report.json")
          if not report_path.exists():
              print("scan-report.json not found -- skipping alerts")
              sys.exit(0)

          try:
              report      = json.loads(report_path.read_text())
              assessments = report.get("phase2_assessment", {}).get("assessments", [])
              if not assessments:
                  print("No assessment data -- skipping alerts")
                  sys.exit(0)
              labels        = evaluate_and_label(assessments)
              label_summary = summarize_labels(labels)
              result = send_alerts(
                  assessment_results=assessments,
                  labels=labels,
                  scan_summary={
                      "total":         label_summary["total_endpoints"],
                      "safe":          label_summary["fully_quantum_safe"],
                      "pqc_ready":     label_summary["pqc_ready"],
                      "non_compliant": label_summary["non_compliant"],
                  },
              )
              print(f"Alerts detected: {result['alerts_detected']}")
              for n in result.get("notifications_sent", []):
                  print(f"  -> {n['channel']}: {n['status']}")
              if not result.get("notifications_sent"):
                  print("  No webhook URLs configured (set QARMOR_SLACK_WEBHOOK / QARMOR_TEAMS_WEBHOOK secrets)")
          except Exception as exc:
              print(f"Notification failed: {exc}", file=sys.stderr)
              sys.exit(0)
          PYEOF

      # -- Build-Breaking Compliance Gate -------------------------------
      #    Reads the REAL scan report produced above.
      #    strict=true  -> exits 1 on HIGH risk (enforce mode)
      #    strict=false -> warns but exits 0 (audit mode, default)
      - name: Check quantum risk compliance (build-breaker)
        id: compliance_check
        env:
          STRICT: ${{ github.event.inputs.strict || 'false' }}
        run: |
          python - << 'PYEOF'
          import json, os, sys
          from pathlib import Path

          strict = os.environ.get("STRICT", "false").lower() == "true"
          mode   = "ENFORCE" if strict else "AUDIT"
          print(f"Compliance mode: {mode}")

          report_path = Path("scan-report.json")
          if not report_path.exists():
              print("scan-report.json not found -- compliance gate skipped.")
              print("::warning::Compliance gate skipped -- scan report missing (network/DNS error?).")
              sys.exit(0)

          report      = json.loads(report_path.read_text())
          assessments = report.get("phase2_assessment", {}).get("assessments", [])
          total       = len(assessments)

          if total == 0:
              print("No endpoints in assessment -- compliance gate skipped.")
              sys.exit(0)

          high_risk = [
              a for a in assessments
              if a.get("overall_quantum_risk") == "HIGH"
          ]

          print(f"Total endpoints assessed: {total}")
          print(f"HIGH risk endpoints:      {len(high_risk)}")

          if high_risk:
              print()
              for a in high_risk[:10]:
                  t   = a.get("target", "?")
                  p   = a.get("port", 443)
                  kex = a.get("key_exchange_algorithm", "?")
                  print(f"  HIGH {t}:{p} -- KEX: {kex}")
              if len(high_risk) > 10:
                  print(f"  ... and {len(high_risk) - 10} more")
              print()
              print("Recommendation: Enable PQC key exchange (ML-KEM / X25519Kyber768).")
              print("See: https://csrc.nist.gov/pubs/fips/203/final")

              if strict:
                  print()
                  print("::error::BUILD FAILED -- HIGH quantum risk (strict mode).")
                  sys.exit(1)
              else:
                  print()
                  print("::warning::HIGH quantum risk detected (audit mode -- build continues).")
                  sys.exit(0)
          else:
              print("PASS: All scanned endpoints pass quantum risk compliance.")
              sys.exit(0)
          PYEOF

      # -- Artifacts ----------------------------------------------------
      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qarmor-scan-${{ github.run_number }}
          path: |
            scan-report.json
            attestation-cdxa.json
          if-no-files-found: warn
          retention-days: 90

      # -- Summary ------------------------------------------------------
      - name: Write job summary
        if: always()
        run: |
          echo "## Q-ARMOR PQC Compliance Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${{ steps.scan.outputs.target || 'pnbindia.in' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan succeeded | \`${{ steps.scan.outputs.scan_ok }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Compliance gate | \`${{ steps.compliance_check.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts: \`scan-report.json\`, \`attestation-cdxa.json\` (90-day retention)" >> $GITHUB_STEP_SUMMARY
